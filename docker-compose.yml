services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: papertrail
      POSTGRES_PASSWORD: papertrail
      POSTGRES_DB: papertrail
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papertrail"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/papertrail123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 512M
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  edgar-ingester:
    build:
      context: .
      dockerfile: services/edgar-ingester/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      redpanda: { condition: service_healthy }
    env_file: .env
    volumes:
      - ./shared:/app/shared

  claim-extractor:
    build:
      context: .
      dockerfile: services/claim-extractor/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      redpanda: { condition: service_healthy }
    env_file: .env
    volumes:
      - ./shared:/app/shared

  contradiction-detector:
    build:
      context: .
      dockerfile: services/contradiction-detector/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      redpanda: { condition: service_healthy }
      ollama: { condition: service_started }
    env_file: .env
    volumes:
      - ./shared:/app/shared

  graph-builder:
    build:
      context: .
      dockerfile: services/graph-builder/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      redpanda: { condition: service_healthy }
      neo4j: { condition: service_started }
    env_file: .env
    volumes:
      - ./shared:/app/shared

  transcript-ingester:
    build:
      context: .
      dockerfile: services/transcript-ingester/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      redpanda: { condition: service_healthy }
    env_file: .env
    volumes:
      - ./shared:/app/shared

  api-server:
    build:
      context: .
      dockerfile: services/api-server/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      redpanda: { condition: service_healthy }
    env_file: .env
    volumes:
      - ./shared:/app/shared

  surveillance:
    build:
      context: .
      dockerfile: services/surveillance/Dockerfile
    command: python -m surveillance.consumer
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redpanda: { condition: service_healthy }
    env_file: .env
    volumes:
      - ./shared:/app/shared

  celery-worker:
    build:
      context: .
      dockerfile: services/surveillance/Dockerfile
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    env_file: .env
    volumes:
      - ./shared:/app/shared

  flower:
    build:
      context: .
      dockerfile: services/surveillance/Dockerfile
    command: celery -A shared.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis: { condition: service_healthy }
      celery-worker: { condition: service_started }
    env_file: .env
    volumes:
      - ./shared:/app/shared

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        # Browser runs on the host; api-server hostname only works container-to-container
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api-server
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000

volumes:
  postgres-data:
  redis-data:
  neo4j-data:
  ollama-data:
  redpanda-data:

networks:
  default:
    name: papertrail-net
